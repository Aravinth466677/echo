<!DOCTYPE html>
<html>
<head>
    <title>Token Checker</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 5px; white-space: pre-wrap; }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Admin Token Checker</h1>
    <button onclick="checkToken()">Check My Token</button>
    <div id="result"></div>

    <script>
        async function checkToken() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            const resultDiv = document.getElementById('result');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="result error">No token found. Please login first.</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="result">Checking...</div>';

            try {
                const response = await fetch('http://localhost:5000/api/debug/whoami', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                const data = await response.json();
                
                let html = '<div class="result ' + (data.isAdmin ? 'success' : 'error') + '">';
                html += '<strong>LocalStorage User:</strong>\n' + JSON.stringify(user, null, 2) + '\n\n';
                html += '<strong>Token Decoded:</strong>\n' + JSON.stringify(data.decoded, null, 2) + '\n\n';
                html += '<strong>Is Admin:</strong> ' + data.isAdmin + '\n\n';
                
                if (data.isAdmin) {
                    html += '✅ You are admin!';
                } else {
                    html += '❌ NOT admin! Role: ' + data.decoded?.role;
                }
                
                html += '</div>';
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = '<div class="result error">Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
